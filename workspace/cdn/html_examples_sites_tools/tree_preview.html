<script>

  class TreeData {

    id = "";
    data = new Object();
    dataLink = "";
    htmlHolderId = "";
    htmlElem = new Object();
    dataIconBase = "";
    renderingMode = "";
    nodesOpenMode = "";



    constructor (
      id,
      dataLink,
      data,
      htmlHolderId,
      htmlElem,
      dataIconBase,
      renderingMode,
      nodesOpenMode
    ) {
      this.id = id || "";

      if ( this.id === "" ) {
        throw new Error( "Required Data ID." );
      }

      this.dataLink = dataLink || "";
      this.data = data || new Object();
      this.htmlHolderId = htmlHolderId || "";
      if ( this.htmlHolderId === "" ) {
        throw new Error( "Required HtmlHolder ID." );
      }

      this.dataIconBase = dataIconBase || "";
      this.renderingMode = renderingMode;
      this.nodesOpenMode = nodesOpenMode;
    }

  }



  class TreeExamples {

    #treeInstances = new Object();
    #treeData = new Object();
    tsHtml = 1;

    treeJsonDataIconBase = "";



    constructor() {
      this.#treeInstances = new Object();
      this.#treeData = new Object();
      this.tsHtml = 1;

      this.treeJsonDataIconBase = "";
    }



    setDataItems ( treeData ) {
      this.#treeData = treeData;

      return this;
    }

    addDataItem( inData ) {
      const treeDataId = inData.id;
      this.#treeData[ treeDataId ] = inData;

      return this;
    }

    getTreeData() {
      return this.#treeData;
    }

    getDataItemById( treeDataId ) {
      const dataItem = this.#treeData[ treeDataId ];
      return dataItem;
    }



    exampleFunc( inSelector, jsonItem, eventPayload ) {

      let text = ( jsonItem.text ) ?? "";
      let tagImg_miniImage = eventPayload.treeHtmlNode.querySelector( ".jstree-html-node-holder-icon > img" );
      let imgSrc = tagImg_miniImage.getAttribute( "src" );
      let imgAlt = tagImg_miniImage.getAttribute( "alt" );

      if ( this.tsHtml === 1 ) {
          this.tsHtml = document.body.querySelector( inSelector );
      }

      this.tsHtml.innerHTML = `
        <img class="mini_image" src="${imgSrc}" alt="${imgAlt}" />
        <div>${text}</div>`;
    }



    renderTree( id, holderElemId, data, renderingMode, modeShownNodes ) {

        this.#treeInstances[ id ] = new Tree();
        let tree = this.#treeInstances[ id ];

        tree
          .setDebug( false )
          .setMainHtmlNodeId( holderElemId )
          .setNodesWithIcons( true )
          .setRenderingMode( renderingMode )
          .setNodesOpenedMode( modeShownNodes )
          .setModifiable( false )
          .addThisClassEventListener (
            TreeConstants.TreeEventsNames.EVENT_NAME__BEFORE_RENDER_ONE_NODE,
            ( eventName, eventPayload ) => {

              if ( this.debug === true ) {
                console.log( eventName, eventPayload );
              }


              let iconSrc = eventPayload.dataForRendering.iconSrc;
              eventPayload.dataForRendering.iconSrc = [ this.treeJsonDataIconBase, iconSrc ].join("");

              return { "value": eventPayload.dataForRendering };
            }
          ).addJSTreeEventListener (
              TreeConstants.TreeEventsNames.EVENT_NAME__TREE_NODE_LABEL__CLICK,
              ( eventName, eventPayload ) => {
                let locTree = this.#treeInstances[ id ];

                  if ( this.debug === true ) {

                    //# example to obtain of the current tree node the data that was used to render the tree.
                    let treeNodeData = {
                      "treeClassInstance": locTree,
                      "eventName": eventName,
                      "eventPayload": eventPayload,
                      "flatClone": eventPayload.jsonNode._flatClone,
                      "deepClone": locTree.getTreeDataByJPath( eventPayload.jsonNode._pathArray )
                    };

                    console.log( { treeNodeData } );
                  }

                this.exampleFunc( ".testing_html", eventPayload.jsonNode._flatClone, eventPayload );

              }
           )
          .render( data );

    }



    loadDataAndRenderTree( id, holderElemId, dataUrl, renderingMode, modeShownNodes ) {

        // example to load by url
        this.#treeInstances[ id ] = new Tree();
        let tree = this.#treeInstances[ id ];

        tree
            .setDebug( false )
            .setMainHtmlNodeId( holderElemId )
            .setRenderingMode( renderingMode )
            .setNodesOpenedMode( modeShownNodes )
            .setNodesWithIcons( true )
            .load( dataUrl );

    }



    renderExamples() {

      let keys = Object.keys( this.#treeData );
      let counter = 1;
      let itemsNumber = keys.length;
      let maxCounter = ( itemsNumber + 2 );

      let elem = document.getElementsByTagName( "BODY" )[ 0 ];

      loop: while( counter < maxCounter ) {
        counter++;
        if ( counter >= maxCounter ) {
          break loop;
        }

        let itemCounter = ( counter - 2 );
        let id = keys[ itemCounter ];
        let dataItem = this.#treeData[ id ];

        if ( dataItem[ "dataLink" ] && dataItem[ "dataLink" ].length > 1 ) {

          this.loadDataAndRenderTree (
            dataItem[ "id" ],
            dataItem[ "htmlHolderId" ],
            dataItem[ "dataLink" ],
            dataItem[ "renderingMode" ],
            dataItem[ "nodesOpenMode" ]
          );

        } else if ( ( dataItem[ "data" ] !== null ) && ( dataItem[ "data" ] !== undefined ) && ( Object.keys( dataItem[ "data" ] ).length !== 0 ) ) {

          this.renderTree (
            dataItem[ "id" ],
            dataItem[ "htmlHolderId" ],
            dataItem[ "data" ],
            dataItem[ "renderingMode" ],
            dataItem[ "nodesOpenMode" ]
          );

        }

      }

      return 2;

    }

  }

</script>
