name: "${WORKSPACE_NAME}"

networks:
  jaisocx_dc_opened_one_for_browsers_network:
    name: "${OPENED_ONE_FOR_BROWSERS_NETWORK_NAME}"
    driver: bridge
  # jaisocx_dc_opened_several_for_browsers_network:
  #   name: "${OPENED_SEVERAL_FOR_BROWSERS_NETWORK_NAME}"
  #   driver: bridge
  jaisocx_dc_opened_for_inet_installs_n_browsers_network:
    name: "${OPENED_FOR_INET_INSTALLS_NETWORK_NAME}"
    driver: bridge
  jaisocx_dc_internal_connected_all_network:
    name: "${INTERNAL_CONNECTED_ALL_NETWORK_NAME}"
    driver: ipvlan
    enable_ipv6: false
    external: false
    internal: true
    attachable: false
    ipam:
      config:
        - subnet: "${SUBNET_IPv4}"
          ip_range: "${IP_RANGE_IPv4}"
#        - subnet: "${SUBNET_IPv6}"
#          ip_range: "${IP_RANGE_IPv6}"



secrets:
  for_yml:
    file: "./.env"
    external: false
  beyond_yml:
    file: "./.env_beyond_yml"
    external: false
  php_env:
    # file: "./docker_compose/PHP/.env_php_fpm"
    file: "./docker_compose/PHP/.env_php_composer"
    external: false



# --------------
# -- SERVICES --
services:

  alpine:
    build:
      context: "./docker_compose/Alpine/docker"



  a4dc:
    build:
      context: "./docker_compose/Prince/docker"
      args:
        - "A_GROUP_USERS_NAME=privileged"
        - "A_USER_NAME=user"
    secrets:
      - for_yml
      - beyond_yml
    volumes:
      - "${WORKSPACE_VOLUME}/:${IN_DOCKER_WORKSPACE_VOLUME}/"
      - "${A4DC_INSTALL_TARBALLS_VOLUME}/:${A4DC_INSTALL_IN_DOCKER_TARBALLS_VOLUME}/"
    dns:
      - "${DNS_SERVER_IPv4}"
    networks:
      #      jaisocx_dc_opened_for_inet_installs_n_browsers_network:
      #        aliases:
      #          - "a4dc.basetasks.site"
      jaisocx_dc_internal_connected_all_network:
        ipv4_address: "${A4DC_IPv4}"
  #        ipv6_address: "${A4DC_IPv6}"



  #; -- Nodejs "ts" in dev mode --
  #;   might need installs of js libs to node_modules, need "opened_for_inet_installs" docker network,
  #;   need "ts:dns" for inet installs.
  #; in prod mode,
  #;   A. maybe need Express endpoints or https static endpoints.
  #;      might connect to "opened_ONE_for_browsers" docker network.
  #;      other services the best way to remove from "opened_ONE_for_browsers" docker network,
  #;      otherwise, just to rename to "opened_several_for_browsers" docker network,
  #;      in order to know transparently about Your own deploy.
  #;      the "ts:dns" stands for inet installs in docker.
  #;      the "ts:ports" stands for access in inet sites browsers.
  #;      ports were exposed in Dockerfile.
  #;
  ts:
    build:
      context: "./docker_compose/ts/docker"
      args:
        - "A_GROUP_USERS_NAME=privileged"
        - "A_USER_NAME=user"
        - "A_NODE_SOFTWARE_HOME=${NODE_SOFTWARE_HOME}"
    secrets:
      - for_yml
      - beyond_yml
    volumes:
      - "${WORKSPACE_VOLUME}/:${IN_DOCKER_WORKSPACE_VOLUME}/"
      - "${NODE_TARBALLS_VOLUME}/:${NODE_TARBALLS_IN_DOCKER_VOLUME}/"
      - "./docker_compose/ts/logs/:${NODE_SOFTWARE_LOGS}/"
    dns:
      - "${DNS_SERVER_IPv4}"
    ports:
      - "${EXPRESS_SECURE_PORT}:${EXPRESS_SECURE_PORT}"
      - "${EXPRESS_PORT}:${EXPRESS_PORT}"
      - "${NODE_HTTPS_PORT}:${NODE_HTTPS_PORT}"
      - "${NODE_HTTP_FLAT_PORT}:${NODE_HTTP_FLAT_PORT}"
      - "${NODE_DEBUG_PORT}:${NODE_DEBUG_PORT}"
      #; Port of installed Jaisocx Sites Tools to workspace/ts/cloned_repos
      # - "8449:8449"
    networks:
      jaisocx_dc_internal_connected_all_network:
        aliases:
          - "${EXPRESS_INTERNAL_DOMAIN_NAME}"
          - "${NODE_INTERNAL_DOMAIN_NAME}"
        ipv4_address: "${NODE_IPv4}"
        # ipv6_address: "${NODE_IPv6}"
      # jaisocx_dc_opened_one_for_browsers_network:
      #   aliases:
      #     - "${FORBROWSER_DOMAIN_NAME}"
      #        ipv4_address: "${OPENED_NODE_HTTP_IPv4}"
      #        ipv6_address: "${OPENED_NODE_HTTP_IPv6}"
      jaisocx_dc_opened_for_inet_installs_n_browsers_network:
        aliases:
          - "${EXPRESS_OPENED_DOMAIN_NAME}"
          - "${NODE_OPENED_DOMAIN_NAME}"
  #; -- End block: Nodejs "ts" in dev mode --



  #; -- Nodejs "ts_prod" in prod mode --
  #;   B. maybe need like just proxiing of Express endpoints
  #;      by another https endpoint, connected to "opened_ONE_for_browsers" docker network.
  #;      "ts:dns" ain't in the "internal" docker network without access to inet.
  #;      "ts:ports" ain't in the "internal" docker network,
  #;      other services connect via "${EXPRESS_INTERNAL_DOMAIN_NAME}:<in Dockerfile exposed port>"
  #;      ports remain exposed in Dockerfile.
