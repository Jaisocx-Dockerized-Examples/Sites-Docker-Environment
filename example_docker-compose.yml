  #    # extra_hosts:
  #      # for XDebug configuration .ini
  #      # - "host.docker.internal:host-gateway"
  #; -- End block: php-fpm8.3 "php_fpm" for the Jaisocx Sites Server, no inet installs, no open ports --



  #; -- php-fpm8.3 "php_composer" for the Jaisocx Sites Server, may install php packages to vendor from inet, no open ports --
  #;      the "php_composer:dns" stands for inet installs in docker, tarballs and php packages to vendor from inet.
  php_composer:
    # -- installs, due to composer.json, php open source packages to folder "vendor", in the same workspace volume, like of [php_fpm], too --
    build:
      context: "./docker_compose/PHP/docker"
      args:
        - "A_GROUP_USERS_NAME=privileged"
        - "A_USER_NAME=user"
        - "A_PHP_SOFTWARE_HOME=${PHP_SOFTWARE_HOME}"
    secrets:
      - for_yml
      - beyond_yml
      - php_env
    volumes:
      - "${WORKSPACE_VOLUME}/:${IN_DOCKER_WORKSPACE_VOLUME}/"
      - "${PHP_TARBALLS_VOLUME}/:${PHP_TARBALLS_IN_DOCKER_VOLUME}/"
      - "./docker_compose/PHP/logs/:${PHP_SOFTWARE_LOGS}/"
    dns:
      - "${DNS_SERVER_IPv4}"
    networks:
      jaisocx_dc_opened_for_inet_installs_n_browsers_network:
        aliases:
          - "${PHP_FPM_OPEN_DOMAIN_NAME}"
      jaisocx_dc_internal_connected_all_network:
        aliases:
          - "${PHP_COMPOSER_DOMAIN_NAME}"
        ipv4_address: "${PHP_COMPOSER_IPv4}"
        # ipv6_address: "${PHP_COMPOSER_IPv6}"
    extra_hosts:
      # for XDebug configuration .ini
      - "host.docker.internal:host-gateway"
